name: MG Build Linux AMD64 Binary

on:
  push:
    tags:
      - 'v*' # 只有当你推送 v1.0.0, v2.1.3 这种标签时才会触发

permissions:
  contents: write # 必须赋予写权限，否则 GitHub 无权帮你创建 Release 挂载文件

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你仓库的最新源码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 部署速度最快的 Bun 运行时（Context-mode 的原生编译利器）
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. 安装项目依赖（不包含测试等无用开销）
      - name: Install dependencies
        run: bun install --production

      # 4. 终极一击：编译生成纯正的 Linux AMD64 单文件二进制程序
      - name: Compile to Single Binary
        run: |
          # 编译成单文件包，移除所有无用的测试、网页等文件夹
          bun build ./src/index.ts --compile --target=node-linux-x64 --outfile ./context-mode-linux-amd64

      # 5. 将编译好的独立二进制程序自动发布到 GitHub Release 中
      - name: Create GitHub Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ./context-mode-linux-amd64
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated single-file binary compiled strictly for Linux AMD64 architecture."
          draft: false
          prerelease: false
