name: Manual Build Linux AMD64 Binary

# 开启手动触发开关
on:
  workflow_dispatch:

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库最新源码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 部署 Bun 运行时
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. 安装项目依赖
      - name: Install dependencies
        run: bun install --production

      # 4. 编译生成 Linux AMD64 单文件二进制
      - name: Compile to Single Binary
        run: |
          bun build ./src/index.ts --compile --target=node-linux-x64 --outfile ./context-mode-linux-amd64

      # 5. 将编译好的文件作为打包产物上传（可以直接在网页端下载，无需创建 Release）
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-mode-linux-amd64-binary
          path: ./context-mode-linux-amd64
          retention-days: 5 # 产物在 GitHub 保留 5 天，过期自动清理
